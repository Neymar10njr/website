services:
  db:
    image: postgres:16-alpine
    container_name: treknest-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: treknest
      POSTGRES_USER: treknest
      POSTGRES_PASSWORD: treknest_dev_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U treknest"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: treknest-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - backend_uploads:/app/app/static/uploads
    environment:
      - DATABASE_URI=postgresql+psycopg2://treknest:treknest_dev_password@db:5432/treknest
      - SECRET_KEY=treknesT_bhutan_secret_2026
      - JWT_SECRET_KEY=change_me_in_prod_jwt_2026
      - FLASK_ENV=development
      - PUBLIC_BACKEND_URL=http://localhost:5000
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: treknest-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  backend_uploads:
  postgres_data:
