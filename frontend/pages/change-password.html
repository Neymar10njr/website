<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - TrekNest Bhutan</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo"><h1>🏔️ TrekNest Bhutan</h1></div>
            <ul class="nav-menu">
                <li><a href="#" onclick="logout()">Logout</a></li>
            </ul>
        </div>
    </nav>

    <section class="auth-page-section">
        <div class="auth-card">
            <div id="forcedBanner" class="auth-banner" style="display:none">
                <strong>Change your password to continue</strong>
                <p>For security, you must change the temporary password issued to you before accessing the rest of the platform.</p>
            </div>

            <h2 id="pageTitle">Change Password</h2>
            <p class="auth-help">Pick something strong and memorable. At least 6 characters; longer is better.</p>

            <form id="changePasswordForm" onsubmit="submitChangePassword(event)" class="auth-form-page">
                <label>Current password
                    <input type="password" id="oldPassword" required autocomplete="current-password">
                </label>
                <label>New password
                    <input type="password" id="newPassword" required minlength="6" autocomplete="new-password">
                </label>
                <label>Confirm new password
                    <input type="password" id="confirmPassword" required minlength="6" autocomplete="new-password">
                </label>
                <div id="changePasswordError" class="auth-error" style="display:none"></div>
                <div id="changePasswordSuccess" class="auth-success" style="display:none"></div>
                <button type="submit" class="btn btn-primary btn-large full-width">Update Password</button>
                <p class="auth-secondary-action" id="cancelLink">
                    <a href="#" onclick="goBack(); return false;">Cancel</a>
                </p>
            </form>
        </div>
    </section>

    <script src="../js/main.js"></script>
    <script>
        const me = requireAuth();
        if (me && me.must_change_password) {
            document.getElementById('forcedBanner').style.display = 'block';
            document.getElementById('pageTitle').textContent = 'Set Your Password';
            document.getElementById('cancelLink').style.display = 'none';
        }

        function goBack() {
            const u = getCurrentUser();
            if (!u) { window.location.href = 'index.html'; return; }
            window.location.href = (DASHBOARD_BY_TYPE && DASHBOARD_BY_TYPE[u.user_type]) || 'index.html';
        }

        async function submitChangePassword(event) {
            event.preventDefault();
            const errEl = document.getElementById('changePasswordError');
            const okEl = document.getElementById('changePasswordSuccess');
            errEl.style.display = 'none'; okEl.style.display = 'none';

            const oldPw = document.getElementById('oldPassword').value;
            const newPw = document.getElementById('newPassword').value;
            const confirmPw = document.getElementById('confirmPassword').value;

            if (newPw !== confirmPw) {
                errEl.textContent = 'New password and confirmation do not match.';
                errEl.style.display = 'block';
                return;
            }
            if (newPw === oldPw) {
                errEl.textContent = 'New password must be different from your current password.';
                errEl.style.display = 'block';
                return;
            }

            try {
                const r = await authFetch(API_BASE_URL + '/auth/change-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ old_password: oldPw, new_password: newPw })
                });
                const data = await r.json();
                if (!r.ok) {
                    errEl.textContent = data.error || 'Failed to update password';
                    errEl.style.display = 'block';
                    return;
                }
                okEl.textContent = '✅ Password updated. Redirecting to your dashboard…';
                okEl.style.display = 'block';

                const stored = JSON.parse(sessionStorage.getItem('currentUser') || '{}');
                stored.must_change_password = false;
                sessionStorage.setItem('currentUser', JSON.stringify(stored));

                setTimeout(() => {
                    const u = getCurrentUser();
                    window.location.href = (DASHBOARD_BY_TYPE && DASHBOARD_BY_TYPE[u.user_type]) || 'index.html';
                }, 1200);
            } catch (e) {
                errEl.textContent = 'Network error: ' + e.message;
                errEl.style.display = 'block';
            }
        }
    </script>
</body>
</html>
