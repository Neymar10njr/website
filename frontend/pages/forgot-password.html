<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password — TrekNest Bhutan</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/booking-form.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo"><h1>🏔️ TrekNest Bhutan</h1></div>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
            </ul>
        </div>
    </nav>

    <section class="booking-section">
        <div class="booking-container">
            <h2>Forgot your password?</h2>
            <p style="text-align:center; color:#666; margin-bottom:1.5rem">Enter your email and we'll send you a reset link.</p>

            <form id="forgotForm" onsubmit="submitForgot(event)" class="booking-form">
                <div class="form-group">
                    <label for="email">Email address</label>
                    <input type="email" id="email" required placeholder="you@example.com">
                </div>
                <div id="forgotMessage" class="auth-error"></div>
                <button type="submit" class="btn btn-primary full-width btn-large">Send Reset Link</button>
                <a href="index.html" class="btn btn-outline-primary full-width" style="margin-top:0.75rem; text-align:center">← Back to Home</a>
            </form>
        </div>
    </section>

    <script src="../js/main.js"></script>
    <script>
        async function submitForgot(e) {
            e.preventDefault();
            const msg = document.getElementById('forgotMessage');
            msg.style.display = 'none';
            try {
                const r = await fetch(API_BASE_URL + '/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: document.getElementById('email').value.trim() })
                });
                const data = await r.json();
                msg.textContent = data.message || data.error || 'Done.';
                msg.style.display = 'block';
                msg.style.background = r.ok ? '#d4f4dd' : '#fde2e2';
                msg.style.color = r.ok ? '#1e7d32' : '#d33';
                msg.style.borderColor = r.ok ? '#a3d9b1' : '#f5b5b5';
            } catch (err) {
                msg.textContent = 'Network error: ' + err.message;
                msg.style.display = 'block';
            }
        }
    </script>
</body>
</html>
