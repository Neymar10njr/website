<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Confirmed - TrekNest Bhutan</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/booking-form.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo"><h1>🏔️ TrekNest Bhutan</h1></div>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="treks.html">Explore Treks</a></li>
                <li><a href="accommodations.html">Stays</a></li>
                <li><a href="group-treks.html">Group Tours</a></li>
                <li><a href="profile.html">My Bookings</a></li>
            </ul>
        </div>
    </nav>

    <section class="booking-section">
        <div class="booking-container">
            <div id="confirmCard" class="confirm-card">
                <p>Loading booking details…</p>
            </div>
        </div>
    </section>

    <footer id="siteFooter"></footer>

    <script src="../js/main.js"></script>
    <script src="../js/footer.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const bookingId = parseInt(params.get('id'), 10);
        const card = document.getElementById('confirmCard');

        if (!bookingId) {
            card.innerHTML = '<p style="color:#d33">Invalid booking link.</p>';
        } else {
            authFetch(API_BASE_URL + '/bookings/' + bookingId)
                .then(r => r.ok ? r.json() : Promise.reject(r))
                .then(b => {
                    const checkIn = new Date(b.check_in_date).toLocaleDateString('en-US', {weekday:'short', year:'numeric', month:'short', day:'numeric'});
                    const checkOut = new Date(b.check_out_date).toLocaleDateString('en-US', {weekday:'short', year:'numeric', month:'short', day:'numeric'});
                    const nights = Math.ceil((new Date(b.check_out_date) - new Date(b.check_in_date)) / (1000 * 60 * 60 * 24));
                    const phoneClean = (b.accommodation_phone || '').replace(/[^\d+]/g, '');
                    const waPhone = (b.accommodation_phone || '').replace(/\D/g, '');

                    card.innerHTML = `
                        <div class="confirm-icon">✅</div>
                        <h2>Booking Confirmed!</h2>
                        <p class="confirm-subtitle">Booking reference: <strong>#${b.id}</strong></p>

                        <div class="confirm-section">
                            <h3>${b.accommodation_name}</h3>
                            <p class="confirm-meta">📍 ${b.accommodation_address || ''}</p>
                        </div>

                        <div class="confirm-grid">
                            <div><span class="confirm-label">Guest</span><strong>${b.guest_name}</strong></div>
                            <div><span class="confirm-label">Room</span><strong>${b.room_type || 'Room'} · ${b.room_number}</strong></div>
                            <div><span class="confirm-label">Check-in</span><strong>${checkIn}</strong></div>
                            <div><span class="confirm-label">Check-out</span><strong>${checkOut}</strong></div>
                            <div><span class="confirm-label">Nights</span><strong>${nights}</strong></div>
                            <div><span class="confirm-label">Guests</span><strong>${b.number_of_guests}</strong></div>
                        </div>

                        <div class="confirm-total">
                            <div class="confirm-total-line"><span>Price per night</span><span>Nu. ${b.price_per_night}</span></div>
                            <div class="confirm-total-line"><span>${nights} night${nights !== 1 ? 's' : ''}</span><span>Nu. ${b.total_price.toLocaleString()}</span></div>
                            <div class="confirm-total-line confirm-grand"><span>Total Paid</span><span>Nu. ${b.total_price.toLocaleString()}</span></div>
                        </div>

                        ${b.special_requests ? `<div class="confirm-section"><span class="confirm-label">Special requests</span><p>${b.special_requests}</p></div>` : ''}

                        <div class="confirm-status status-${b.status}">Status: <strong>${b.status.toUpperCase()}</strong></div>

                        ${b.accommodation_phone ? `
                            <div class="contact-buttons" style="margin-top:1.5rem">
                                <a href="tel:${phoneClean}" class="btn-contact btn-call">${phoneIconSvg(18)}<span>Call Property</span></a>
                                <a href="https://wa.me/${waPhone}" target="_blank" rel="noopener" class="btn-contact btn-whatsapp">${whatsappIconSvg(18)}<span>WhatsApp</span></a>
                            </div>
                        ` : ''}

                        <div style="display:flex; gap:0.75rem; margin-top:1.5rem; flex-wrap:wrap;">
                            <a href="profile.html" class="btn btn-primary" style="flex:1; text-align:center; min-width:160px;">View My Bookings</a>
                            <a href="accommodations.html" class="btn btn-outline-primary" style="flex:1; text-align:center; min-width:160px;">Book Another Stay</a>
                        </div>
                    `;
                })
                .catch(() => {
                    card.innerHTML = '<p style="color:#d33">Could not load booking details. Please check your booking ID.</p>';
                });
        }
    </script>
</body>
</html>
