<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — TrekNest Bhutan</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/booking-form.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo"><h1>🏔️ TrekNest Bhutan</h1></div>
            <ul class="nav-menu"><li><a href="index.html">Home</a></li></ul>
        </div>
    </nav>

    <section class="booking-section">
        <div class="booking-container">
            <h2>Choose a new password</h2>
            <form id="resetForm" onsubmit="submitReset(event)" class="booking-form">
                <div class="form-group">
                    <label for="password">New password (at least 6 characters)</label>
                    <input type="password" id="password" required minlength="6">
                </div>
                <div class="form-group">
                    <label for="passwordConfirm">Confirm new password</label>
                    <input type="password" id="passwordConfirm" required minlength="6">
                </div>
                <div id="resetMessage" class="auth-error"></div>
                <button type="submit" class="btn btn-primary full-width btn-large">Update Password</button>
            </form>
        </div>
    </section>

    <script src="../js/main.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');
        if (!token) {
            document.querySelector('.booking-container').innerHTML =
                '<h2>Invalid link</h2><p style="color:#d33">No reset token in URL. Request a new password reset link from the login page.</p>';
        }

        async function submitReset(e) {
            e.preventDefault();
            const msg = document.getElementById('resetMessage');
            msg.style.display = 'none';

            const pw1 = document.getElementById('password').value;
            const pw2 = document.getElementById('passwordConfirm').value;
            if (pw1 !== pw2) {
                msg.textContent = 'Passwords do not match';
                msg.style.display = 'block';
                msg.style.background = '#fde2e2';
                msg.style.color = '#d33';
                return;
            }
            try {
                const r = await fetch(API_BASE_URL + '/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password: pw1 })
                });
                const data = await r.json();
                msg.textContent = data.message || data.error;
                msg.style.display = 'block';
                msg.style.background = r.ok ? '#d4f4dd' : '#fde2e2';
                msg.style.color = r.ok ? '#1e7d32' : '#d33';
                if (r.ok) {
                    setTimeout(() => window.location.href = 'index.html', 2000);
                }
            } catch (err) {
                msg.textContent = 'Network error: ' + err.message;
                msg.style.display = 'block';
            }
        }
    </script>
</body>
</html>
